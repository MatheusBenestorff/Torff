<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Torff Web Server</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f9;
        color: #333;
        text-align: center;
        padding: 50px;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        display: inline-block;
      }
      h1 {
        color: #0078d4;
      }
      form {
        margin-top: 25px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
        padding-top: 20px;
        border-top: 1px solid #eee;
      }
      input {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        width: 250px;
      }
      button {
        padding: 10px 20px;
        background-color: #0078d4;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
      }
      button:hover {
        background-color: #005a9e;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Torff Server is online!</h1>
      <p>
        This HTML is coming directly from a file in the folder
        <strong>wwwroot</strong>.
      </p>

      <form method="POST" action="/api/teste">
        <input type="text" name="usuario" placeholder="Digite seu nome" required />
        <input type="text" name="projeto" placeholder="Nome do projeto" required />
        <button type="submit">Send Data via POST</button>
      </form>
    </div>
  </body>
</html>
